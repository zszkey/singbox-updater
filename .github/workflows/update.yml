name: 更新 Sing-box 节点 (多源)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 多源拉取并生成配置
        run: python3 .github/scripts/update.py

      - name: 提交更新
        run: |
          git config user.name "singbox-bot"
          git config user.email "bot@singbox-update"
          git add config.json sub.txt
          git diff --cached --quiet || git commit -m "🔄 节点更新 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          git push

      - name: 发送 Telegram 通知
        if: success()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          NODE_COUNT=$(cat node_count.txt 2>/dev/null || echo 0)
          SOURCE_ORDER=$(cat source_order.txt 2>/dev/null || echo "未知")
          UPDATED=$(TZ='Asia/Shanghai' date '+%m/%d %H:%M')
          MSG=$(printf '✅ 代理节点已更新\n🕐 %s\n📦 %s 个节点\n🔗 来源: %s\n\n手机 Karing 订阅:\nhttps://raw.githubusercontent.com/zszkey/singbox-updater/main/sub.txt' "$UPDATED" "$NODE_COUNT" "$SOURCE_ORDER")
          curl -s --max-time 10 "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown"
